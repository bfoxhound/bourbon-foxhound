<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BourbonFoxhound Feed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            padding: 20px;
            line-height: 1.5;
        }
        .feed-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4a574;
        }
        .feed-header h2 {
            color: #d4a574;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .feed-header p {
            color: #888;
            font-size: 14px;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 12px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #d4a574;
        }
        .stat-label {
            color: #666;
        }
        .section { 
            margin-bottom: 25px; 
        }
        .section h3 {
            color: #d4a574;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border-left: 4px solid #d4a574;
            transition: all 0.2s;
            position: relative;
        }
        .card:hover { 
            transform: translateX(4px);
            background: #222;
        }
        /* Tier styling */
        .card.unicorn {
            border-left-color: #ff6b6b;
            background: linear-gradient(90deg, #1a1a1a 0%, #2a1f1f 100%);
        }
        .card.rare-midrange {
            border-left-color: #a855f7;
            background: linear-gradient(90deg, #1a1a1a 0%, #1f1a2a 100%);
        }
        .card.value {
            border-left-color: #22c55e;
            border-left-color: #d4a574;
        }
        .card.watchlist {
            border-left-color: #f59e0b;
            background: linear-gradient(90deg, #1a1a1a 0%, #2a2515 100%);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            gap: 10px;
        }
        .card-title {
            color: #f5f5f5;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            line-height: 1.3;
        }
        .card-title:hover { color: #d4a574; }
        .tags {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .tag.unicorn { background: #ff6b6b; color: #1a1a1a; }
        .tag.rare-midrange { background: #a855f7; color: white; }
        .tag.value { background: #22c55e; color: #1a1a1a; }
        .tag.watchlist { background: #f59e0b; color: #1a1a1a; }
        .tag.sale { background: #e74c3c; color: white; }
        .tag.news { background: #3498db; color: white; }
        .tag.alert { background: #ff0000; color: white; animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .card-summary {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: #666;
        }
        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .price { color: #22c55e; font-weight: 600; }
        .price-secondary { color: #ff6b6b; font-weight: 600; }
        .original-price { text-decoration: line-through; color: #444; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #e74c3c;
            background: #2a1f1f;
            border-radius: 8px;
        }
        .timestamp {
            text-align: center;
            color: #444;
            font-size: 11px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        .empty {
            text-align: center;
            padding: 20px;
            color: #555;
            font-style: italic;
        }
        .tier-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            font-size: 11px;
            color: #666;
        }
        .tier-legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tier-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .tier-dot.unicorn { background: #ff6b6b; }
        .tier-dot.rare { background: #a855f7; }
        .tier-dot.value { background: #22c55e; }
        .upvotes {
            color: #ff6b6b;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="feed-header">
        <h2>🥃 BourbonFoxhound</h2>
        <p>Live bourbon intelligence — Unicorns, Allocated & Value Picks</p>
        
        <div class="stats-bar" id="stats-bar">
            <div class="loading">Loading...</div>
        </div>
        
        <div class="tier-legend">
            <span><span class="tier-dot unicorn"></span> Unicorn</span>
            <span><span class="tier-dot rare"></span> Rare Midrange</span>
            <span><span class="tier-dot value"></span> Value Pick</span>
        </div>
    </div>

    <div id="feed-content">
        <div class="loading">Loading latest bourbon intel...</div>
    </div>

    <div class="timestamp" id="timestamp"></div>

    <script>
        async function loadBourbonData() {
            const container = document.getElementById('feed-content');
            const statsBar = document.getElementById('stats-bar');
            
            try {
                const response = await fetch('data/bourbon-data.json');
                if (!response.ok) throw new Error('Failed to load data');
                
                const data = await response.json();
                renderFeed(data);
                renderStats(data, statsBar);
                
            } catch (error) {
                console.error('Error loading feed:', error);
                container.innerHTML = `
                    <div class="error">
                        <p>Unable to load feed data.</p>
                        <p style="font-size: 12px; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderStats(data, container) {
            const stats = data.stats || {};
            container.innerHTML = `
                <div class="stat">
                    <div class="stat-value">${stats.unicornCount || 0}</div>
                    <div class="stat-label">🦄 Unicorns</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${stats.rareMidrangeCount || 0}</div>
                    <div class="stat-label">💎 Rare</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${stats.valueCount || 0}</div>
                    <div class="stat-label">⭐ Value</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${stats.alertCount || 0}</div>
                    <div class="stat-label">🚨 Alerts</div>
                </div>
            `;
        }

        function renderFeed(data) {
            const container = document.getElementById('feed-content');
            let html = '';

            // Group drops by tier
            const watchlist = data.drops?.filter(d => d.type === 'WATCHLIST') || [];
            const unicorns = data.drops?.filter(d => d.tier === 'unicorn' && d.type !== 'WATCHLIST') || [];
            const rare = data.drops?.filter(d => d.tier === 'rare_midrange') || [];
            const value = data.drops?.filter(d => d.tier === 'value') || [];

            // Section 1: Watchlist (Alerts)
            if (watchlist.length > 0) {
                html += '<div class="section"><h3>🚨 Watchlist Alerts</h3>';
                watchlist.forEach(item => {
                    html += renderCard(item, 'watchlist');
                });
                html += '</div>';
            }

            // Section 2: Unicorn Drops
            if (unicorns.length > 0) {
                html += '<div class="section"><h3>🦄 Unicorn / Holy Grail</h3>';
                unicorns.forEach(item => {
                    html += renderCard(item, 'unicorn');
                });
                html += '</div>';
            }

            // Section 3: Rare Midrange
            if (rare.length > 0) {
                html += '<div class="section"><h3>💎 Rare Midrange</h3>';
                rare.forEach(item => {
                    html += renderCard(item, 'rare-midrange');
                });
                html += '</div>';
            }

            // Section 4: Value Picks
            if (value.length > 0) {
                html += '<div class="section"><h3>⭐ Best Value Picks</h3>';
                value.forEach(item => {
                    html += renderCard(item, 'value');
                });
                html += '</div>';
            }

            // Section 5: Secondary Market
            if (data.sales?.length > 0) {
                html += '<div class="section"><h3>📈 Secondary Market</h3>';
                data.sales.forEach(sale => {
                    html += renderSaleCard(sale);
                });
                html += '</div>';
            }

            // Section 6: News & Intelligence
            if (data.news?.length > 0) {
                const alerts = data.news.filter(n => n.is_alert || n.tier === 'unicorn');
                const regular = data.news.filter(n => !n.is_alert && n.tier !== 'unicorn');
                
                if (alerts.length > 0) {
                    html += '<div class="section"><h3>🔥 Hot Intelligence</h3>';
                    alerts.slice(0, 8).forEach(news => {
                        html += renderNewsCard(news, true);
                    });
                    html += '</div>';
                }
                
                if (regular.length > 0) {
                    html += '<div class="section"><h3>📰 Latest News</h3>';
                    regular.slice(0, 6).forEach(news => {
                        html += renderNewsCard(news, false);
                    });
                    html += '</div>';
                }
            }

            container.innerHTML = html;
            
            // Update timestamp
            if (data.lastUpdated) {
                const lastUpdated = new Date(data.lastUpdated).toLocaleDateString('en-US', { 
                    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' 
                });
                const version = data.scraperVersion || 'v3';
                document.getElementById('timestamp').textContent = `Updated: ${lastUpdated} • Scraper ${version}`;
            }
        }

        function renderCard(item, tierClass) {
            const isAlert = item.type === 'WATCHLIST';
            const tagClass = isAlert ? 'watchlist' : tierClass;
            const tagLabel = isAlert ? 'ALERT' : item.tier?.toUpperCase() || item.type;
            
            return `
                <div class="card ${tierClass}">
                    <div class="card-header">
                        <a href="${item.url || '#'}" class="card-title" target="_blank" rel="noopener">${item.title}</a>
                        <div class="tags">
                            <span class="tag ${tagClass}">${tagLabel}</span>
                        </div>
                    </div>
                    ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ''}
                    <div class="card-meta">
                        ${item.age && item.age !== 'Various' ? `<span>🕐 ${item.age}</span>` : ''}
                        ${item.proof && item.proof !== 'Various' ? `<span>🔥 ${item.proof}</span>` : ''}
                        ${item.price ? `<span class="price">💵 ${item.price}</span>` : ''}
                        <span>📍 ${item.source || 'Unknown'}</span>
                    </div>
                </div>
            `;
        }

        function renderSaleCard(sale) {
            const hasSecondary = sale.salePrice && sale.salePrice !== 'Market' && sale.salePrice !== 'Retail';
            
            return `
                <div class="card">
                    <div class="card-header">
                        <a href="${sale.url || '#'}" class="card-title" target="_blank" rel="noopener">${sale.product}</a>
                        <span class="tag sale">MARKET</span>
                    </div>
                    <div class="card-meta">
                        ${sale.originalPrice ? `<span class="original-price">MSRP: ${sale.originalPrice}</span>` : ''}
                        ${hasSecondary ? `<span class="price-secondary">Secondary: ${sale.salePrice}</span>` : `<span>${sale.salePrice}</span>`}
                        <span>🏪 ${sale.source || 'Unknown'}</span>
                    </div>
                    ${sale.notes ? `<div class="card-summary" style="margin-top: 6px;">${sale.notes}</div>` : ''}
                </div>
            `;
        }

        function renderNewsCard(news, isHot) {
            const tierClass = news.tier || 'news';
            const tagClass = news.is_alert ? 'alert' : tierClass;
            const tagLabel = news.is_alert ? '🚨 ALERT' : (news.tier?.toUpperCase() || 'NEWS');
            const upvotes = news.upvotes ? `<span class="upvotes">▲ ${news.upvotes}</span>` : '';
            
            return `
                <div class="card ${tierClass}">
                    <div class="card-header">
                        <a href="${news.url || '#'}" class="card-title" target="_blank" rel="noopener">${news.title}</a>
                        <div class="tags">
                            ${upvotes}
                            <span class="tag ${tagClass}">${tagLabel}</span>
                        </div>
                    </div>
                    <div class="card-meta">
                        <span>📰 ${news.source || 'Unknown'}</span>
                    </div>
                </div>
            `;
        }

        // Load on page load
        loadBourbonData();
        
        // Refresh every 5 minutes
        setInterval(loadBourbonData, 5 * 60 * 1000);
    </script>
</body>
</html>
